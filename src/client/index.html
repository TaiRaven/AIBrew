<html class="-polaris">
  <head>
    <title>AIBrew</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <sdk:now-ux-globals></sdk:now-ux-globals>

    <!-- Caveat font (Google Fonts) — loaded before polyfill so CSS queues early -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

    <!-- AIBrew design tokens -->
    <style>
      :root {
        --aibrew-font-disp:    'Caveat', Georgia, serif;
        --aibrew-font-body:    'Caveat', Georgia, serif;
        --aibrew-font-mono:    'Courier New', Courier, monospace;

        --aibrew-ink:          #1d1a17;
        --aibrew-ink-2:        #3d352c;
        --aibrew-ink-3:        #6b5c4e;
        --aibrew-ink-4:        #9e8874;
        --aibrew-paper:        #fbf8f2;
        --aibrew-paper-2:      #f2ede4;
        --aibrew-accent:       #c2410c;
        --aibrew-accent-hover: #a73509;
        --aibrew-destructive:  #b91c1c;
        --aibrew-disabled-bg:  #e8e3db;
        --aibrew-disabled-fg:  #9e8874;

        --sp-xs:  4px;
        --sp-sm:  8px;
        --sp-md:  16px;
        --sp-lg:  24px;
        --sp-xl:  32px;
        --sp-2xl: 48px;
      }

      body {
        background-color: var(--aibrew-paper);
        font-family: var(--aibrew-font-body);
        margin: 0;
        padding: 0;
      }

      #root {
        min-height: 100vh;
      }
    </style>

    <!-- Array.from polyfill — inline, type="text/javascript" (synchronous), BEFORE module script -->
    <!-- NO CDATA wrappers per D-06 (user-locked decision). If blank-page issues occur, CDATA is the first diagnostic. -->
    <script type="text/javascript">
      (function () {
        var testWorks = (function () {
          try {
            var result = Array.from(new Set([1, 2]));
            return Array.isArray(result) && result.length === 2 && result[0] === 1;
          } catch (e) { return false; }
        })();
        if (testWorks) return;
        var originalArrayFrom = Array.from;
        function specArrayFrom(arrayLike, mapFn, thisArg) {
          if (arrayLike == null) throw new TypeError('Array.from requires an array-like or iterable object');
          var C = this;
          if (typeof C !== 'function' || C === Object) { C = Array; }
          var mapping = typeof mapFn === 'function';
          var iterFn = arrayLike[Symbol.iterator];
          if (typeof iterFn === 'function') {
            var result = []; var i = 0;
            var iterator = iterFn.call(arrayLike); var step;
            while (!(step = iterator.next()).done) {
              result[i] = mapping ? mapFn.call(thisArg, step.value, i) : step.value;
              i++;
            }
            result.length = i; return result;
          }
          var items = Object(arrayLike);
          var len = Math.min(Math.max(Number(items.length) || 0, 0), Number.MAX_SAFE_INTEGER);
          var result = new C(len);
          for (var k = 0; k < len; k++) {
            result[k] = mapping ? mapFn.call(thisArg, items[k], k) : items[k];
          }
          result.length = len; return result;
        }
        Array.from = function (arrayLike, mapFn, thisArg) {
          if (arrayLike != null && typeof arrayLike[Symbol.iterator] === 'function') {
            try { return specArrayFrom.call(this, arrayLike, mapFn, thisArg); }
            catch (e) { return originalArrayFrom.call(this, arrayLike, mapFn, thisArg); }
          }
          return originalArrayFrom.call(this, arrayLike, mapFn, thisArg);
        };
        if (window.Element && Element.Methods) {
          Element.Methods.remove = function (element) {
            element = $(element);
            if (element.parentNode) { element.parentNode.removeChild(element); }
            return element;
          };
          Element.addMethods();
        }
      })();
    </script>

    <!-- React app entrypoint — type="module" (deferred/async, loads AFTER sync polyfill above) -->
    <script
      src="main.tsx?uxpcb=$[UxFrameworkScriptables.getFlushTimestamp()]"
      type="module"
    ></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
